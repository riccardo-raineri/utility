<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertitore Immagini</title>
    <link rel="stylesheet" href="convertitoreimmagini.css">
    <style>
        .resize-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .checkbox-row input { cursor: pointer; }
    </style>
</head>
<body>

    <a class="back-link" href="dashboard.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Dashboard
    </a>

    <div class="card">
        <div class="card-header">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
            </div>
            <div class="title-group">
                <h2>Convertitore Immagini</h2>
                <p>Converti, ridimensiona e ottimizza le tue immagini</p>
            </div>
            <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" aria-label="Cambia tema">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
        </div>

        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <div class="drop-zone-content">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p class="drop-title">Trascina qui l'immagine</p>
                <p class="drop-subtitle">oppure <span>sfoglia i file</span></p>
            </div>
            <input type="file" id="file-input" accept="image/*" hidden onchange="handleFileSelect(event)">
        </div>

        <div class="file-preview" id="file-preview" style="display: none;">
            <div class="thumb-container">
                <img id="preview-img" src="" alt="Anteprima">
            </div>
            <div class="file-info">
                <span class="file-name" id="file-name">nome_file.jpg</span>
                <span class="file-meta" id="file-meta">1920×1080 • 1.2 MB</span>
            </div>
            <button class="btn-remove" onclick="resetFile()" title="Rimuovi immagine" aria-label="Rimuovi immagine">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <div class="options-group" id="options-group" style="display: none;">
            <div class="input-group">
                <label for="format-select">Formato di destinazione</label>
                <select id="format-select" onchange="toggleQualityControl()">
                    <option value="image/png">PNG (.png)</option>
                    <option value="image/jpeg">JPG / JPEG (.jpg)</option>
                    <option value="image/webp">WEBP (.webp)</option>
                    <option value="image/avif">AVIF (.avif)</option>
                </select>
            </div>

            <!-- NUOVE OPZIONI DI RIDIMENSIONAMENTO -->
            <div class="input-group">
                <label>Ridimensiona Dimensioni (PX)</label>
                <div class="resize-grid">
                    <div>
                        <input type="number" id="resize-width" placeholder="Larghezza" oninput="handleDimensionChange('width')">
                    </div>
                    <div>
                        <input type="number" id="resize-height" placeholder="Altezza" oninput="handleDimensionChange('height')">
                    </div>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="keep-aspect" checked>
                    <label for="keep-aspect" style="margin:0; text-transform:none;">Mantieni proporzioni</label>
                </div>
            </div>

            <div class="input-group" id="quality-group" style="display: none;">
                <div class="label-row">
                    <label for="quality-range">Qualità compressione</label>
                    <span class="range-val" id="quality-value">90%</span>
                </div>
                <input type="range" id="quality-range" min="10" max="100" value="90" oninput="updateQualityText(this.value)">
            </div>

            <button class="btn-primary" id="btn-convert" onclick="processConversion()">
                <svg class="btn-icon" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                Elabora Immagine
            </button>
        </div>

        <div class="result-section" id="result-section" style="display: none;">
            <hr class="divider">
            <h3 class="section-title">Confronto & Risultato</h3>

            <div class="image-slider-container" id="slider-container">
                <span class="badge-overlay badge-before">PRIMA</span>
                <span class="badge-overlay badge-after">DOPO</span>
                <img id="compare-after-img" class="slider-img" src="" alt="Convertito">
                <div class="slider-before-wrapper" id="slider-before-wrapper">
                    <img id="compare-before-img" class="slider-img" src="" alt="Originale">
                </div>
                <div class="slider-handle" id="slider-handle">
                    <div class="slider-button">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                            <polyline points="15 18 9 12 15 6" transform="rotate(180 12 12)"></polyline>
                        </svg>
                    </div>
                </div>
                <input type="range" class="range-slider-input" min="0" max="100" value="50" id="comparison-range" oninput="updateSliderPosition(this.value)">
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-label">Peso Originale</span>
                    <strong class="stat-value" id="stat-orig-size">0 KB</strong>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Nuovo Peso</span>
                    <strong class="stat-value" id="stat-new-size">0 KB</strong>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Differenza</span>
                    <strong class="stat-value" id="stat-diff-perc">0%</strong>
                </div>
            </div>

            <button class="btn-success" id="btn-download" onclick="downloadFile()">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Scarica Immagine
            </button>
        </div>
    </div>

    <script>
        let loadedImage = null;
        let originalFile = null;
        let originalFileName = "";
        let convertedBlob = null;
        let convertedUrl = null;
        let aspectRatio = 1;

 function toggleTheme() {
            const body = document.body;
            const goingLight = body.getAttribute('data-theme') !== 'light';

            if (goingLight) {
                body.setAttribute('data-theme', 'light');
            } else {
                body.removeAttribute('data-theme');
            }

            localStorage.setItem('toolbox_theme', goingLight ? 'light' : 'dark');
        }

        const dropZone = document.getElementById('drop-zone');
        ['dragenter', 'dragover'].forEach(name => dropZone.addEventListener(name, (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); }));
        ['dragleave', 'drop'].forEach(name => dropZone.addEventListener(name, (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); }));
        dropZone.addEventListener('drop', (e) => { if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]); });

        function handleFileSelect(e) { if (e.target.files.length) processFile(e.target.files[0]); }

        function processFile(file) {
            originalFile = file;
            originalFileName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    loadedImage = img;
                    aspectRatio = img.width / img.height;
                    
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('file-name').textContent = file.name;
                    document.getElementById('file-meta').textContent = `${img.width}×${img.height} px • ${formatBytes(file.size)}`;

                    document.getElementById('resize-width').value = img.width;
                    document.getElementById('resize-height').value = img.height;

                    document.getElementById('drop-zone').style.display = 'none';
                    document.getElementById('file-preview').style.display = 'flex';
                    document.getElementById('options-group').style.display = 'block';

                    toggleQualityControl();
                    hideResults();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function handleDimensionChange(type) {
            if (!document.getElementById('keep-aspect').checked || !aspectRatio) return;
            const wInput = document.getElementById('resize-width');
            const hInput = document.getElementById('resize-height');

            if (type === 'width' && wInput.value) {
                hInput.value = Math.round(wInput.value / aspectRatio);
            } else if (type === 'height' && hInput.value) {
                wInput.value = Math.round(hInput.value * aspectRatio);
            }
        }

        function toggleQualityControl() {
            const format = document.getElementById('format-select').value;
            document.getElementById('quality-group').style.display = (format === 'image/jpeg' || format === 'image/webp' || format === 'image/avif') ? 'block' : 'none';
            hideResults();
        }

        function updateQualityText(val) { document.getElementById('quality-value').textContent = val + '%'; }

        function updateSliderPosition(value) {
            const wrapper = document.getElementById('slider-before-wrapper');
            const handle = document.getElementById('slider-handle');
            const container = document.getElementById('slider-container');
            const beforeImg = document.getElementById('compare-before-img');
            wrapper.style.width = value + '%';
            handle.style.left = value + '%';
            if (container) beforeImg.style.width = container.offsetWidth + 'px';
        }

        function processConversion() {
            if (!loadedImage) return;

            const format = document.getElementById('format-select').value;
            const quality = parseFloat(document.getElementById('quality-range').value) / 100;
            const targetWidth = parseInt(document.getElementById('resize-width').value) || loadedImage.width;
            const targetHeight = parseInt(document.getElementById('resize-height').value) || loadedImage.height;

            const canvas = document.createElement('canvas');
            canvas.width = targetWidth;
            canvas.height = targetHeight;
            const ctx = canvas.getContext('2d');

            if (format === 'image/jpeg') {
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            ctx.drawImage(loadedImage, 0, 0, targetWidth, targetHeight);

            canvas.toBlob((blob) => {
                if (!blob) return alert("Formato non supportato dal tuo browser.");

                if (convertedUrl) URL.revokeObjectURL(convertedUrl);
                convertedBlob = blob;
                convertedUrl = URL.createObjectURL(blob);

                document.getElementById('compare-before-img').src = document.getElementById('preview-img').src;
                document.getElementById('compare-after-img').src = convertedUrl;

                const origBytes = originalFile.size;
                const newBytes = blob.size;
                const diffPerc = (((newBytes - origBytes) / origBytes) * 100).toFixed(1);

                document.getElementById('stat-orig-size').textContent = formatBytes(origBytes);
                document.getElementById('stat-new-size').textContent = formatBytes(newBytes);

                const diffElem = document.getElementById('stat-diff-perc');
                diffElem.textContent = (diffPerc > 0 ? '+' : '') + diffPerc + '%';
                diffElem.style.color = diffPerc <= 0 ? 'var(--color-success)' : 'var(--color-danger)';

                document.getElementById('result-section').style.display = 'block';
                setTimeout(() => updateSliderPosition(50), 50);
            }, format, quality);
        }

        function downloadFile() {
            if (!convertedUrl) return;
            const format = document.getElementById('format-select').value;
            const extMap = { 'image/png': 'png', 'image/jpeg': 'jpg', 'image/webp': 'webp', 'image/avif': 'avif' };
            const link = document.createElement('a');
            link.download = `${originalFileName}_resizing.${extMap[format] || 'png'}`;
            link.href = convertedUrl;
            link.click();
        }

        function hideResults() { document.getElementById('result-section').style.display = 'none'; }

        function resetFile() {
            loadedImage = null;
            originalFile = null;
            if (convertedUrl) URL.revokeObjectURL(convertedUrl);
            convertedUrl = null;

            document.getElementById('file-input').value = "";
            document.getElementById('drop-zone').style.display = 'block';
            document.getElementById('file-preview').style.display = 'none';
            document.getElementById('options-group').style.display = 'none';
            hideResults();
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Byte';
            const k = 1024, sizes = ['Byte', 'KB', 'MB', 'GB'], i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
		
		// Applica subito il tema corretto all'apertura della pagina
        applyStoredTheme();
    </script>
</body>
</html>
