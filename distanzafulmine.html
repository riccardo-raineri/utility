<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore Distanza Fulmine</title>
	<link rel="icon" type="image/svg+xml" href="favicon.svg">
	<link rel="apple-touch-icon" href="apple-touch-icon.png">
	
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Foglio di Stile -->
    <link rel="stylesheet" href="distanzafulmine.css">
</head>
<body>

    <!-- Canvas di Sfondo -->
    <div class="bg-canvas">
        <div class="bg-grid-pattern"></div>
    </div>

    <div class="app-container">

        <!-- Navigation Bar -->
        <nav class="top-nav">
            <a class="back-link" href="dashboard.html">
                <i data-lucide="arrow-left"></i>
                Dashboard
            </a>

            <div class="nav-actions">
                <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" aria-label="Cambia tema">
                    <i data-lucide="sun" class="icon-sun"></i>
                    <i data-lucide="moon" class="icon-moon"></i>
                </button>
                <span class="tool-badge">
                    <i data-lucide="cloud-lightning"></i>
                    Storm Tracker
                </span>
            </div>
        </nav>

        <!-- Tool Layout Container -->
        <main class="tool-layout">
            <div class="card">
                
                <!-- Card Header -->
                <div class="card-header">
                    <div class="icon">
                        <i data-lucide="zap"></i>
                    </div>
                    <div class="title-group">
                        <h2>Distanza Fulmine</h2>
                        <p>Calcola quanto è vicino il temporale</p>
                    </div>
                </div>

                <!-- Sezione Cronometro Live -->
                <div class="timer-section">
                    <button id="timer-btn" class="btn-timer" onclick="toggleTimer()">
                        <span id="timer-label">
                            <i data-lucide="zap" class="btn-icon"></i>
                            Clicca al LAMPO
                        </span>
                        <span id="timer-display">0.0s</span>
                    </button>
                </div>

                <div class="divider"><span>oppure inserisci i secondi</span></div>

                <!-- Input Manuale -->
                <div class="input-group">
                    <label for="secondi">Tempo trascorso (secondi)</label>
                    <input type="number" id="secondi" placeholder="es. 5 secondi" min="0" step="0.1" oninput="calcolaDistanza()" inputmode="numeric" pattern="[0-9]*">
                </div>

                <!-- Temperatura per il calcolo della velocità del suono -->
                <div class="input-group">
                    <label for="temperatura">Temperatura Aria Stimata</label>
                    <select id="temperatura" onchange="calcolaDistanza()">
                        <option value="0">0°C (331 m/s - Freddo)</option>
                        <option value="10">10°C (337 m/s - Mite)</option>
                        <option value="20" selected>20°C (343 m/s - Standard)</option>
                        <option value="30">30°C (349 m/s - Caldo estivo)</option>
                    </select>
                </div>

                <button class="btn-secondary" onclick="resetForm()">Azzera</button>

                <!-- Box Risultati -->
                <div class="result" id="result-box">
                    <div class="status-badge" id="status-badge">
                        <span class="status-dot"></span>
                        <span id="status-text">Sicuro</span>
                    </div>

                    <div class="result-main">
                        <span class="value-large" id="distanza-km">0.00</span>
                        <span class="unit">km di distanza</span>
                    </div>

                    <div class="result-details">
                        <div class="detail-row">
                            <span>Distanza in metri:</span>
                            <strong id="distanza-m">0 m</strong>
                        </div>
                        <div class="detail-row">
                            <span>Velocità suono applicata:</span>
                            <strong id="speed-applied">343 m/s</strong>
                        </div>
                    </div>

                    <div class="safety-tip-box" id="safety-tip-box">
                        <i data-lucide="alert-triangle" id="safety-icon"></i>
                        <span id="safety-tip"></span>
                    </div>
                </div>

            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <span>Creative Utility Toolbox — Riccardo Raineri</span>
        </footer>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            applyStoredTheme();
            refreshIcons();
        });

        function refreshIcons() {
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        /* -----------------------------------------------------------------
           GESTIONE TEMA (DEFAULT DARK / OPTIONAL LIGHT)
           ----------------------------------------------------------------- */
        function applyStoredTheme() {
            const savedTheme = localStorage.getItem('toolbox_theme');
            if (savedTheme === 'light') {
                document.body.setAttribute('data-theme', 'light');
            } else {
                document.body.removeAttribute('data-theme');
            }
        }

        function toggleTheme() {
            const body = document.body;
            const goingLight = body.getAttribute('data-theme') !== 'light';
            
            if (goingLight) {
                body.setAttribute('data-theme', 'light');
            } else {
                body.removeAttribute('data-theme');
            }
            
            localStorage.setItem('toolbox_theme', goingLight ? 'light' : 'dark');
        }

        /* -----------------------------------------------------------------
           LOGICA CRONOMETRO E CALCOLO DISTANZA
           ----------------------------------------------------------------- */
        let timerInterval = null;
        let startTime = 0;
        let isTiming = false;

        function toggleTimer() {
            const timerBtn = document.getElementById('timer-btn');
            const timerLabel = document.getElementById('timer-label');
            const timerDisplay = document.getElementById('timer-display');
            const inputSecondi = document.getElementById('secondi');

            if (!isTiming) {
                // Avvio timer al lampo
                isTiming = true;
                startTime = performance.now();
                timerBtn.classList.add('active');
                
                timerLabel.innerHTML = `<i data-lucide="volume-2" class="btn-icon"></i> Clicca al TUONO!`;
                refreshIcons();
                
                timerInterval = setInterval(() => {
                    const elapsed = (performance.now() - startTime) / 1000;
                    timerDisplay.textContent = elapsed.toFixed(1) + 's';
                }, 100);
            } else {
                // Fermo timer al tuono
                isTiming = false;
                clearInterval(timerInterval);
                const finalElapsed = ((performance.now() - startTime) / 1000).toFixed(1);
                
                timerBtn.classList.remove('active');
                
                timerLabel.innerHTML = `<i data-lucide="zap" class="btn-icon"></i> Clicca al LAMPO`;
                refreshIcons();
                
                timerDisplay.textContent = finalElapsed + 's';
                inputSecondi.value = finalElapsed;
                calcolaDistanza();
            }
        }

        function calcolaDistanza() {
            const secondi = parseFloat(document.getElementById('secondi').value);
            const tempC = parseFloat(document.getElementById('temperatura').value) || 20;
            const resultBox = document.getElementById('result-box');

            if (isNaN(secondi) || secondi <= 0) {
                resultBox.style.display = 'none';
                return;
            }

            // Formula fisica della velocità del suono nell'aria: v = 331.3 + (0.606 * TempC)
            const velocitaSuono = Math.round(331.3 + (0.606 * tempC)); 
            const metri = secondi * velocitaSuono;
            const km = metri / 1000;

            document.getElementById('distanza-km').textContent = km.toFixed(2);
            document.getElementById('distanza-m').textContent = Math.round(metri).toLocaleString('it-IT') + ' m';
            document.getElementById('speed-applied').textContent = `${velocitaSuono} m/s (${tempC}°C)`;

            // Gestione Livelli di Pericolo
            const badge = document.getElementById('status-badge');
            const statusText = document.getElementById('status-text');
            const safetyTip = document.getElementById('safety-tip');
            const safetyTipBox = document.getElementById('safety-tip-box');

            badge.className = 'status-badge'; 

            if (km < 3) {
                badge.classList.add('danger');
                statusText.textContent = 'PERICOLO IMMINENTE';
                safetyTip.textContent = 'Il temporale è molto vicino! Cerca subito riparo all’interno di un edificio o di un’automobile con finestrini chiusi.';
                safetyTipBox.style.borderColor = 'var(--color-danger)';
            } else if (km <= 10) {
                badge.classList.add('warning');
                statusText.textContent = 'ATTENZIONE';
                safetyTip.textContent = 'Temporale nelle vicinanze. Evita spazi aperti, alberi isolati e strutture metalliche.';
                safetyTipBox.style.borderColor = 'var(--color-warning)';
            } else {
                badge.classList.add('safe');
                statusText.textContent = 'DISTANZA DI SICUREZZA';
                safetyTip.textContent = 'Il temporale è ancora lontano, ma resta vigile se si sta avvicinando.';
                safetyTipBox.style.borderColor = 'var(--color-safe)';
            }

            resultBox.style.display = 'block';
            refreshIcons();
        }

        function resetForm() {
            if (isTiming) toggleTimer();
            document.getElementById('secondi').value = '';
            document.getElementById('timer-display').textContent = '0.0s';
            document.getElementById('result-box').style.display = 'none';
        }
    </script>
</body>
</html>
