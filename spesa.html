<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista della Spesa 2.0</title>

  <!-- Google Fonts: Space Grotesk (Titoli), IBM Plex Mono (Dati/Scontrino), Inter (Testi base) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

  <!-- Chart.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>

  <!-- Collegamento al file CSS (assicurati che si chiami spesa.css) -->
  <link rel="stylesheet" href="spesa.css">
</head>
<body>

  <!-- Topbar -->
  <header class="topbar">
    <a href="#" class="back-link">←</a>
    <h1 class="logo">Spesa<span class="logo-accent">2.0</span></h1>
    <button id="theme-toggle" class="icon-btn" title="Cambia Tema">☼</button>
  </header>

  <!-- Navigazione a Tabs -->
  <nav class="tabs">
    <button class="tab-btn active" data-target="view-lista">Lista</button>
    <button class="tab-btn" data-target="view-scontrino">Scontrino</button>
    <button class="tab-btn" data-target="view-statistiche">Storico & Stat.</button>
  </nav>

  <main>
    <!-- VISTA 1: LISTA DELLA SPESA -->
    <div id="view-lista" class="view active">
      <div class="card">
        <h3>Aggiungi Prodotto</h3>
<form id="form-prodotto">
  <div class="field-row-grid">
    
    <label class="grid-prodotto">
      Prodotto
      <input type="text" id="input-nome" placeholder="Es. Latte" required>
    </label>
    
    <label class="grid-categoria">
      Categoria
      <select id="input-categoria">
        <option value="Alimentari">Alimentari</option>
        <option value="Casa">Casa</option>
        <option value="Igiene">Igiene</option>
        <option value="Extra">Extra</option>
      </select>
    </label>
    
    <label class="grid-qta">
      Q.tà / Unità
      <div class="input-with-unit">
        <input type="number" id="input-qta" value="1" min="0.1" step="0.1" required>
        <select id="input-unita">
          <option value="pz">pz</option>
          <option value="kg">kg</option>
          <option value="lt">lt</option>
        </select>
      </div>
    </label>
    
    <label class="grid-prezzo">
      Prezzo (€)
      <input type="number" id="input-prezzo" placeholder="0.00" step="0.01" required>
    </label>
    
    <!-- Avvolto in un div senza <label> per allinearlo correttamente -->
    <div class="grid-azione">
      <button type="submit" class="btn btn-primary">Aggiungi</button>
    </div>
    
  </div>
</form>
      </div>

      <div id="lista-prodotti">
        <!-- I prodotti verranno iniettati qui da JavaScript -->
      </div>
    </div>

    <!-- VISTA 2: SCONTRINO (CARRELLO) -->
    <div id="view-scontrino" class="view">
      <div class="card">
        <h3>Riepilogo Scontrino</h3>
        <p style="font-size: 12px; color: var(--testo-attenuato);">Prodotti spuntati dalla tua lista.</p>
        
        <div class="scontrino">
          <div id="scontrino-contenuto">
            <!-- Righe dello scontrino iniettate da JS -->
          </div>
          <div class="scontrino-totale">
            TOTALE: <span id="scontrino-totale-valore">€ 0.00</span>
          </div>
        </div>
        
        <div class="scontrino-azioni">
          <button class="btn btn-ghost" id="btn-svuota">Svuota Carrello</button>
          <button class="btn btn-primary" id="btn-salva">Salva e Archivia</button>
        </div>
      </div>
    </div>

    <!-- VISTA 3: STATISTICHE E STORICO -->
    <div id="view-statistiche" class="view">
      
      <!-- Statistiche Mensili -->
      <div class="card">
        <h3>Andamento Mensile</h3>
        <div class="stat-riepilogo">
          <div>
            <span class="stat-label">Spesa Mensile</span>
            <span class="stat-valore">€ 142.50</span>
          </div>
          <div>
            <span class="stat-label">Media Scontrino</span>
            <span class="stat-valore">€ 35.60</span>
          </div>
        </div>
        <canvas id="chart-mensile" height="150"></canvas>
      </div>

      <!-- Storico Prezzi (Esempio) -->
      <div class="card">
        <h3>Storico Prezzi (€/kg)</h3>
        <canvas id="chart-storico" height="120"></canvas>
      </div>
      
    </div>
  </main>

  <!-- Toast Notification -->
  <div id="toast" class="toast">Azione completata!</div>

  <!-- Collegamento al file JS -->
  <script src="spesa.js"></script>
</body>
</html>
