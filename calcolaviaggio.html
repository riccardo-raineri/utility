<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Computer</title>
    <link rel="stylesheet" href="calcolaviaggio.css">
</head>
<body>

    <a class="back-link" href="dashboard.html">← Dashboard</a>

    <div class="dashboard">
        <div class="panel-header">
            <h2>Trip Computer</h2>
            <div class="status-dot"></div>
        </div>

        <div class="input-group">
            <label for="distance">Distanza (km)</label>
            <input type="number" id="distance" placeholder="000">
        </div>
        <div class="input-group">
            <label for="consumption">Consumo (km/l)</label>
            <input type="number" id="consumption" placeholder="00.0">
        </div>
        <div class="input-group">
            <label for="price">Prezzo alla pompa (€/l)</label>
            <input type="number" id="price" placeholder="1.85" step="0.01">
        </div>

        <!-- OPZIONI AGGIUNTIVE: andata/ritorno raddoppia la distanza,
             il numero di passeggeri divide il costo totale -->
        <div class="options-row">
            <button type="button" class="toggle-btn active" id="btn-solo-andata" onclick="setTripType(false)">Solo andata</button>
            <button type="button" class="toggle-btn" id="btn-andata-ritorno" onclick="setTripType(true)">Andata/ritorno</button>
        </div>

        <div class="input-group">
            <label for="passengers">Numero passeggeri (per dividere la spesa)</label>
            <input type="number" id="passengers" placeholder="1" min="1" step="1" value="1">
        </div>

        <button class="calculate" onclick="calculateTrip()">Calcola</button>

        <div class="output" id="output" style="display:none;">
            <div class="output-row">
                <span class="label">Litri richiesti</span>
                <span class="value" id="liters">0.0 L</span>
            </div>
            <div class="output-row">
                <span class="label">Costo stimato</span>
                <span class="value" id="cost">0.00 €</span>
            </div>
            <!-- Mostrata solo se passengers > 1 -->
            <div class="per-person" id="per-person">
                Quota a persona: <span id="cost-per-person">0.00 €</span>
            </div>
        </div>
    </div>

    <script>
        // Stato: se il viaggio è di sola andata (false) o andata/ritorno (true).
        // Viene aggiornato dai due bottoni toggle e usato nel calcolo finale.
        let isRoundTrip = false;

        /**
         * Aggiorna lo stato andata/ritorno e lo stile dei due bottoni toggle,
         * in modo che sia sempre visibile quale modalità è selezionata.
         */
        function setTripType(roundTrip) {
            isRoundTrip = roundTrip;
            document.getElementById('btn-solo-andata').classList.toggle('active', !roundTrip);
            document.getElementById('btn-andata-ritorno').classList.toggle('active', roundTrip);
        }

        /**
         * Calcola litri necessari e costo totale del viaggio, raddoppiando
         * la distanza se è stato selezionato "andata/ritorno", e mostra
         * anche la quota a persona se i passeggeri sono più di uno.
         */
        function calculateTrip() {
            const distanceInput = parseFloat(document.getElementById('distance').value);
            const consumption = parseFloat(document.getElementById('consumption').value);
            const price = parseFloat(document.getElementById('price').value);
            const passengers = parseInt(document.getElementById('passengers').value) || 1;

            if (!distanceInput || !consumption || !price) return;

            // Se è andata/ritorno, la distanza reale percorsa è doppia
            const distance = isRoundTrip ? distanceInput * 2 : distanceInput;

            const litersNeeded = distance / consumption;
            const totalCost = litersNeeded * price;

            document.getElementById('liters').innerText = litersNeeded.toFixed(1) + ' L';
            document.getElementById('cost').innerText = totalCost.toFixed(2) + ' €';

            // Riga "quota a persona": visibile solo se ha senso dividerla (> 1 persona)
            const perPersonRow = document.getElementById('per-person');
            if (passengers > 1) {
                const perPerson = totalCost / passengers;
                document.getElementById('cost-per-person').innerText = perPerson.toFixed(2) + ' €';
                perPersonRow.style.display = 'block';
            } else {
                perPersonRow.style.display = 'none';
            }

            document.getElementById('output').style.display = 'block';
        }
    </script>

</body>
</html>
