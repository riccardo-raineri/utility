<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertitore Universale</title>
	<link rel="icon" type="image/svg+xml" href="favicon.svg">
	<link rel="apple-touch-icon" href="apple-touch-icon.png">
	
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Foglio di Stile -->
    <link rel="stylesheet" href="convertitore.css">
</head>
<body>

    <!-- Canvas di Sfondo -->
    <div class="bg-canvas">
        <div class="bg-grid-pattern"></div>
    </div>

    <div class="app-container">

        <!-- Navigation Bar -->
        <nav class="top-nav">
            <a class="back-link" href="dashboard.html">
                <i data-lucide="arrow-left"></i>
                Dashboard
            </a>

            <div class="nav-actions">
                <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" aria-label="Cambia tema">
                    <i data-lucide="sun" class="icon-sun"></i>
                    <i data-lucide="moon" class="icon-moon"></i>
                </button>
                <span class="tool-badge">
                    <i data-lucide="arrow-right-left"></i>
                    Convertitore
                </span>
            </div>
        </nav>

        <!-- Area Principale Convertitore -->
        <main class="tool-layout">
            <div class="converter-card">
                
                <div class="card-header">
                    <h2>Convertitore Universale</h2>
                    <div class="subtitle">Unità di misura e valute in tempo reale</div>
                </div>

                <!-- Tab "Unità / Valuta" -->
                <div class="mode-tabs">
                    <button type="button" class="mode-tab active" id="tab-unita" onclick="setMode('unita')">
                        <i data-lucide="scale"></i> Unità
                    </button>
                    <button type="button" class="mode-tab" id="tab-valuta" onclick="setMode('valuta')">
                        <i data-lucide="coins"></i> Valuta
                    </button>
                </div>

                <!-- Selezione Categoria (Visibile solo in modalità Unità) -->
                <select class="category-select" id="category" onchange="populateUnits(this.value)">
                    <option value="lunghezza">Lunghezza</option>
                    <option value="peso">Peso &amp; Massa</option>
                    <option value="temperatura">Temperatura</option>
                    <option value="area">Area</option>
                    <option value="volume">Volume</option>
                    <option value="velocita">Velocità</option>
                    <option value="tempo">Tempo</option>
                    <option value="dati">Dati digitali</option>
                    <option value="pressione">Pressione</option>
                    <option value="energia">Energia</option>
                    <option value="potenza">Potenza</option>
                    <option value="angolo">Angoli</option>
                </select>

                <!-- Primo Blocco Input -->
                <div class="input-row">
                    <input type="number" id="input1" placeholder="0" oninput="calculate(1)">
                    <select class="unit-select" id="unit1" onchange="calculate(1)"></select>
                    <button type="button" class="copy-btn copy-feedback" id="copy1" onclick="copyValue(1)" title="Copia valore">
                        <i data-lucide="copy"></i>
                    </button>
                </div>

                <!-- Icona Separatore / Scambio -->
                <div class="swap-icon">
                    <i data-lucide="arrow-up-down"></i>
                </div>

                <!-- Secondo Blocco Input -->
                <div class="input-row">
                    <input type="number" id="input2" placeholder="0" oninput="calculate(2)">
                    <select class="unit-select" id="unit2" onchange="calculate(1)"></select>
                    <button type="button" class="copy-btn copy-feedback" id="copy2" onclick="copyValue(2)" title="Copia valore">
                        <i data-lucide="copy"></i>
                    </button>
                </div>

                <!-- Stato dell'operazione o aggiornamento valute -->
                <div class="status" id="status-text">Pronto.</div>

            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <span>Creative Utility Toolbox — Riccardo Raineri</span>
        </footer>

    </div>

    <!-- Script Logico del Convertitore e Gestione Tema -->
    <script>
        let mode = 'unita';

        document.addEventListener('DOMContentLoaded', () => {
            applyStoredTheme();
            fetchCurrencies();
            populateUnits(document.getElementById('category').value);
            refreshIcons();
        });

        function refreshIcons() {
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        /* -----------------------------------------------------------------
           GESTIONE TEMA (DEFAULT SCURO / OPTIONAL LIGHT)
           ----------------------------------------------------------------- */
        function applyStoredTheme() {
            const stored = localStorage.getItem('toolbox_theme');
            if (stored === 'light') {
                document.body.setAttribute('data-theme', 'light');
            } else {
                document.body.removeAttribute('data-theme');
            }
        }

        function toggleTheme() {
            const body = document.body;
            const isLight = body.getAttribute('data-theme') === 'light';

            if (isLight) {
                body.removeAttribute('data-theme');
                localStorage.setItem('toolbox_theme', 'dark');
            } else {
                body.setAttribute('data-theme', 'light');
                localStorage.setItem('toolbox_theme', 'light');
            }
        }

        /* -----------------------------------------------------------------
           MODALITÀ (Unità / Valuta)
           ----------------------------------------------------------------- */
        function setMode(newMode) {
            mode = newMode;
            document.getElementById('tab-unita').classList.toggle('active', mode === 'unita');
            document.getElementById('tab-valuta').classList.toggle('active', mode === 'valuta');
            document.getElementById('category').style.display = mode === 'unita' ? 'block' : 'none';

            if (mode === 'valuta') {
                populateUnits('valuta');
            } else {
                populateUnits(document.getElementById('category').value);
            }
        }

        function getActiveCategory() {
            return mode === 'valuta' ? 'valuta' : document.getElementById('category').value;
        }

        /* -----------------------------------------------------------------
           DIZIONARIO DI CONVERSIONE
           ----------------------------------------------------------------- */
        let conversionData = {
            lunghezza: {
                "Millimetri (mm)": 0.001, "Centimetri (cm)": 0.01, "Decimetri (dm)": 0.1,
                "Metri (m)": 1, "Chilometri (km)": 1000,
                "Pollici (in)": 0.0254, "Piedi (ft)": 0.3048, "Yard (yd)": 0.9144,
                "Miglia (mi)": 1609.344, "Miglia nautiche (nmi)": 1852
            },
            peso: {
                "Milligrammi (mg)": 0.001, "Grammi (g)": 1, "Chilogrammi (kg)": 1000,
                "Quintali (q)": 100000, "Tonnellate (t)": 1000000,
                "Once (oz)": 28.3495, "Libbre (lb)": 453.592, "Carati (ct)": 0.2
            },
            area: {
                "Centimetri quadri (cm²)": 0.0001, "Metri quadri (m²)": 1,
                "Ettari (ha)": 10000, "Chilometri quadri (km²)": 1000000,
                "Piedi quadri (ft²)": 0.092903, "Yard quadre (yd²)": 0.836127, "Acri (ac)": 4046.86
            },
            volume: {
                "Millilitri (ml)": 0.001, "Centilitri (cl)": 0.01, "Decilitri (dl)": 0.1,
                "Litri (l)": 1, "Metri cubi (m³)": 1000,
                "Cucchiaini (tsp)": 0.00492892, "Cucchiai (tbsp)": 0.0147868,
                "Once fluide US (fl oz)": 0.0295735, "Tazze US (cup)": 0.236588,
                "Pinte US (pt)": 0.473176, "Galloni US (gal)": 3.78541, "Galloni UK (gal UK)": 4.54609
            },
            velocita: {
                "Metri/sec (m/s)": 3.6, "Km/h": 1, "Miglia/h (mph)": 1.60934,
                "Nodi (kn)": 1.852, "Mach (aria)": 1234.8
            },
            tempo: {
                "Millisecondi (ms)": 0.001, "Secondi (s)": 1, "Minuti (min)": 60,
                "Ore (h)": 3600, "Giorni (d)": 86400, "Settimane (sett)": 604800,
                "Mesi (~30gg)": 2629800, "Anni (365,25gg)": 31557600
            },
            dati: {
                "Bit (b)": 0.125, "Byte (B)": 1, "Kilobyte (KB)": 1024,
                "Megabyte (MB)": 1048576, "Gigabyte (GB)": 1073741824, "Terabyte (TB)": 1099511627776
            },
            pressione: {
                "Pascal (Pa)": 1, "Ettopascal (hPa)": 100, "Kilopascal (kPa)": 1000,
                "Bar": 100000, "Atmosfere (atm)": 101325, "mmHg (torr)": 133.322, "PSI": 6894.76
            },
            energia: {
                "Joule (J)": 1, "Kilojoule (kJ)": 1000, "Calorie (cal)": 4.184,
                "Kilocalorie (kcal)": 4184, "Wattora (Wh)": 3600, "Kilowattora (kWh)": 3600000, "BTU": 1055.06
            },
            potenza: {
                "Watt (W)": 1, "Kilowatt (kW)": 1000, "Cavalli vapore (CV)": 735.499, "Horsepower (hp)": 745.7
            },
            angolo: {
                "Gradi (°)": 0.0174533, "Radianti (rad)": 1, "Gradi centesimali (gon)": 0.015708
            },
            temperatura: { "Celsius (°C)": "special", "Fahrenheit (°F)": "special", "Kelvin (K)": "special" },
            valuta: { "EUR (€)": 1, "USD ($)": "loading", "GBP (£)": "loading", "JPY (¥)": "loading", "CHF (Fr)": "loading" }
        };

        /* -----------------------------------------------------------------
           FETCH VALUTE IN TEMPO REALE
           ----------------------------------------------------------------- */
        async function fetchCurrencies() {
            try {
                document.getElementById('status-text').innerText = "Aggiornamento valute in corso…";

                const res = await fetch('https://open.er-api.com/v6/latest/EUR');
                const data = await res.json();

                conversionData.valuta = {
                    "EUR (€)": 1,
                    "USD ($)": data.rates.USD,
                    "GBP (£)": data.rates.GBP,
                    "JPY (¥)": data.rates.JPY,
                    "CHF (Fr)": data.rates.CHF,
                    "CNY (¥)": data.rates.CNY
                };

                if (mode === 'valuta') populateUnits('valuta');

                document.getElementById('status-text').innerText = "Valute aggiornate al " + data.time_last_update_utc.split(' ')[0];
            } catch (e) {
                document.getElementById('status-text').innerText = "Errore di connessione al servizio valute.";
            }
        }

        /* -----------------------------------------------------------------
           POPILAMENTO TENDINE & CALCOLO
           ----------------------------------------------------------------- */
        function populateUnits(cat) {
            const u1 = document.getElementById('unit1');
            const u2 = document.getElementById('unit2');

            u1.innerHTML = '';
            u2.innerHTML = '';

            Object.keys(conversionData[cat]).forEach(unit => {
                u1.innerHTML += `<option value="${unit}">${unit}</option>`;
                u2.innerHTML += `<option value="${unit}">${unit}</option>`;
            });

            if (u1.options.length > 1) u2.selectedIndex = 1;

            calculate(1);
        }

        function calcTemp(val, from, to) {
            let celsius;
            if (from.includes("Celsius")) celsius = val;
            else if (from.includes("Fahrenheit")) celsius = (val - 32) * 5 / 9;
            else if (from.includes("Kelvin")) celsius = val - 273.15;

            if (to.includes("Celsius")) return celsius;
            if (to.includes("Fahrenheit")) return (celsius * 9 / 5) + 32;
            if (to.includes("Kelvin")) return celsius + 273.15;
        }

        function calculate(source) {
            const cat = getActiveCategory();
            const val1 = document.getElementById('input1').value;
            const val2 = document.getElementById('input2').value;
            const u1 = document.getElementById('unit1').value;
            const u2 = document.getElementById('unit2').value;

            if (source === 1 && val1 === '') { document.getElementById('input2').value = ''; return; }
            if (source === 2 && val2 === '') { document.getElementById('input1').value = ''; return; }

            let result;

            if (cat === "temperatura") {
                let v = parseFloat(source === 1 ? val1 : val2);
                result = source === 1 ? calcTemp(v, u1, u2) : calcTemp(v, u2, u1);
            } else {
                const r1 = conversionData[cat][u1];
                const r2 = conversionData[cat][u2];

                if (r1 === "loading" || r2 === "loading") return;

                let v = parseFloat(source === 1 ? val1 : val2);
                result = source === 1 ? (v * r1) / r2 : (v * r2) / r1;
            }

            let target = source === 1 ? 'input2' : 'input1';
            document.getElementById(target).value = parseFloat(result.toFixed(5));
        }

        /* -----------------------------------------------------------------
           COPIA NEGLI APPUNTI
           ----------------------------------------------------------------- */
        function copyValue(inputNumber) {
            const input = document.getElementById('input' + inputNumber);
            const btn = document.getElementById('copy' + inputNumber);

            if (!input.value) return;

            navigator.clipboard.writeText(input.value).then(() => {
                btn.setAttribute('data-feedback', 'Copiato!');
                btn.classList.add('show');
                setTimeout(() => btn.classList.remove('show'), 1200);
            });
        }
    </script>
</body>
</html>
