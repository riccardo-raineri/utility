<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - Generatore Avanzato</title>
	<link rel="icon" type="image/svg+xml" href="favicon.svg">
	<link rel="apple-touch-icon" href="apple-touch-icon.png">
	 
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Libreria QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- Foglio di Stile -->
    <link rel="stylesheet" href="qrcode.css">
</head>
<body>

    <!-- Canvas di Sfondo -->
    <div class="bg-canvas">
        <div class="bg-grid-pattern"></div>
    </div>

    <div class="app-container">

        <!-- Navigation Bar -->
        <nav class="top-nav">
            <a class="back-link" href="dashboard.html">
                <i data-lucide="arrow-left"></i>
                Dashboard
            </a>

            <div class="nav-actions">
                <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" aria-label="Cambia tema">
                    <i data-lucide="sun" class="icon-sun"></i>
                    <i data-lucide="moon" class="icon-moon"></i>
                </button>
                <span class="tool-badge">
                    <i data-lucide="qr-code"></i>
                    QR-Code
                </span>
            </div>
        </nav>

        <!-- Main Card Container -->
        <main class="tool-layout">
            <div class="qr-card">
                
                <!-- Card Header -->
                <div class="qr-header">
                    <div class="tech-icon">
                        <i data-lucide="qr-code"></i>
                    </div>
                    <div>
                        <h2>QR Code Generator</h2>
                        <p>Genera e personalizza codici QR ad alta risoluzione</p>
                    </div>
                </div>

                <!-- Input Contenuto -->
                <div class="input-field">
                    <label for="qr-text">Testo o Link URL</label>
                    <textarea id="qr-text" placeholder="https://esempio.it o inserisci il tuo testo..."></textarea>
                </div>

                <!-- Griglia Colori Personalizzabili -->
                <div class="color-grid">
                    <div class="color-picker-box">
                        <label for="color-dark">Colore QR</label>
                        <input type="color" id="color-dark" value="#000000">
                    </div>
                    <div class="color-picker-box">
                        <label for="color-light">Sfondo</label>
                        <input type="color" id="color-light" value="#ffffff">
                    </div>
                </div>

                <!-- Controllo Dimensione Pixel -->
                <div class="input-field">
                    <label for="qr-size">
                        <span>Dimensione</span>
                        <span class="range-val" id="size-val">256 px</span>
                    </label>
                    <input type="range" id="qr-size" min="128" max="512" step="32" value="256" oninput="document.getElementById('size-val').textContent = this.value + ' px'">
                </div>

                <!-- Pulsante Genera -->
                <button class="btn-action btn-generate" onclick="generateQRCode()">
                    <i data-lucide="refresh-cw"></i>
                    Genera Codice QR
                </button>

                <!-- Area Anteprima -->
                <div class="qr-preview-area" id="preview-area">
                    <div class="placeholder-text" id="placeholder">
                        <i data-lucide="scan"></i>
                        <span>Il tuo QR Code comparirà qui</span>
                    </div>
                    <div id="qrcode"></div>
                </div>

                <!-- Pulsante Scarica PNG -->
                <button class="btn-action btn-download" id="btn-download" onclick="downloadQRCode()">
                    <i data-lucide="download"></i>
                    Scarica Immagine PNG
                </button>

            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <span>Creative Utility Toolbox — Riccardo Raineri</span>
        </footer>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            applyStoredTheme();
            refreshIcons();
        });

        function refreshIcons() {
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        /* -----------------------------------------------------------------
           GESTIONE TEMA (DEFAULT DARK / OPTIONAL LIGHT)
           ----------------------------------------------------------------- */
        function applyStoredTheme() {
            const savedTheme = localStorage.getItem('toolbox_theme');
            if (savedTheme === 'light') {
                document.body.setAttribute('data-theme', 'light');
            } else {
                document.body.removeAttribute('data-theme');
            }
        }

        function toggleTheme() {
            const body = document.body;
            const goingLight = body.getAttribute('data-theme') !== 'light';
            
            if (goingLight) {
                body.setAttribute('data-theme', 'light');
            } else {
                body.removeAttribute('data-theme');
            }
            
            localStorage.setItem('toolbox_theme', goingLight ? 'light' : 'dark');
        }

        /* -----------------------------------------------------------------
           LOGICA QR CODE
           ----------------------------------------------------------------- */
        let qrInstance = null;

        function generateQRCode() {
            const text = document.getElementById('qr-text').value.trim();
            const colorDark = document.getElementById('color-dark').value;
            const colorLight = document.getElementById('color-light').value;
            const size = parseInt(document.getElementById('qr-size').value);
            
            const qrContainer = document.getElementById('qrcode');
            const placeholder = document.getElementById('placeholder');
            const previewArea = document.getElementById('preview-area');
            const btnDownload = document.getElementById('btn-download');

            if (!text) {
                alert("Inserisci un testo o un link prima di generare il QR Code!");
                return;
            }

            // Svuota contenuto precedente
            qrContainer.innerHTML = "";
            placeholder.style.display = "none";
            previewArea.classList.add('active');

            // Genera nuovo QR Code via QRCode.js
            qrInstance = new QRCode(qrContainer, {
                text: text,
                width: size,
                height: size,
                colorDark: colorDark,
                colorLight: colorLight,
                correctLevel: QRCode.CorrectLevel.H
            });

            // Mostra pulsante di download
            btnDownload.style.display = "flex";
            refreshIcons();
        }

        function downloadQRCode() {
            const qrContainer = document.getElementById('qrcode');
            const img = qrContainer.querySelector('img');
            const canvas = qrContainer.querySelector('canvas');

            let imageSrc = "";

            if (img && img.src) {
                imageSrc = img.src;
            } else if (canvas) {
                imageSrc = canvas.toDataURL("image/png");
            }

            if (!imageSrc) {
                alert("Impossibile scaricare l'immagine.");
                return;
            }

            const link = document.createElement('a');
            link.href = imageSrc;
            link.download = 'qrcode_pro.png';
            link.click();
        }
    </script>
</body>
</html>
