<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore QR Code Avanzato</title>
    <link rel="stylesheet" href="qrcode.css">
    <!-- Libreria QRCode.js per generazione pura lato client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div class="qr-card">
        <!-- Header con stile Cyber/Tech -->
        <div class="qr-header">
            <div class="tech-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                    <line x1="10" y1="3" x2="10" y2="10"></line>
                    <line x1="3" y1="10" x2="10" y2="10"></line>
                </svg>
            </div>
            <div>
                <h2>QR Studio Pro</h2>
                <p>Genera e personalizza codici QR ad alta risoluzione</p>
            </div>
        </div>

        <!-- Input Contenuto -->
        <div class="input-field">
            <label for="qr-text">Testo o Link URL</label>
            <textarea id="qr-text" placeholder="https://esempio.it o inserisci il tuo testo..."></textarea>
        </div>

        <!-- Griglia Colori Personalizzabili -->
        <div class="color-grid">
            <div class="color-picker-box">
                <label for="color-dark" style="margin: 0;">Colore QR</label>
                <input type="color" id="color-dark" value="#000000">
            </div>
            <div class="color-picker-box">
                <label for="color-light" style="margin: 0;">Sfondo</label>
                <input type="color" id="color-light" value="#ffffff">
            </div>
        </div>

        <!-- Controllo Dimensione Pixel -->
        <div class="input-field">
            <label for="qr-size">Dimensione <span class="range-val" id="size-val">256 px</span></label>
            <input type="range" id="qr-size" min="128" max="512" step="32" value="256" oninput="document.getElementById('size-val').textContent = this.value + ' px'">
        </div>

        <!-- Pulsante Genera -->
        <button class="btn-action btn-generate" onclick="generateQRCode()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
                <path d="M21 3v5h-5"></path>
            </svg>
            Genera Codice QR
        </button>

        <!-- Area Anteprima -->
        <div class="qr-preview-area" id="preview-area">
            <div class="placeholder-text" id="placeholder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                    <path d="M7 7h.01M17 7h.01M7 17h.01M17 17h.01"></path>
                </svg>
                Il tuo QR Code comparirà qui
            </div>
            <div id="qrcode"></div>
        </div>

        <!-- Pulsante Scarica PNG -->
        <button class="btn-action btn-download" id="btn-download" onclick="downloadQRCode()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Scarica Immagine PNG
        </button>
    </div>

    <script>
        let qrInstance = null;

        function generateQRCode() {
            const text = document.getElementById('qr-text').value.trim();
            const colorDark = document.getElementById('color-dark').value;
            const colorLight = document.getElementById('color-light').value;
            const size = parseInt(document.getElementById('qr-size').value);
            
            const qrContainer = document.getElementById('qrcode');
            const placeholder = document.getElementById('placeholder');
            const previewArea = document.getElementById('preview-area');
            const btnDownload = document.getElementById('btn-download');

            if (!text) {
                alert("Inserisci un testo o un link prima di generare il QR Code!");
                return;
            }

            // Svuota contenuto precedente
            qrContainer.innerHTML = "";
            placeholder.style.display = "none";
            previewArea.classList.add('active');

            // Genera nuovo QR Code via QRCode.js
            qrInstance = new QRCode(qrContainer, {
                text: text,
                width: size,
                height: size,
                colorDark: colorDark,
                colorLight: colorLight,
                correctLevel: QRCode.CorrectLevel.H
            });

            // Mostra pulsante di download
            btnDownload.style.display = "flex";
        }

        function downloadQRCode() {
            const qrContainer = document.getElementById('qrcode');
            const img = qrContainer.querySelector('img');
            const canvas = qrContainer.querySelector('canvas');

            let imageSrc = "";

            if (img && img.src) {
                imageSrc = img.src;
            } else if (canvas) {
                imageSrc = canvas.toDataURL("image/png");
            }

            if (!imageSrc) {
                alert("Impossibile scaricare l'immagine.");
                return;
            }

            const link = document.createElement('a');
            link.href = imageSrc;
            link.download = 'qrcode_pro.png';
            link.click();
        }
    </script>
</body>
</html>
