<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Family — Quote</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="spotify.css">
</head>
<body data-theme="dark">

    <!-- ============ SCHERMATA PIN ============ -->
    <div id="pinGate" class="pin-gate">
        <div class="pin-card">
            <div class="pin-icon">
                <i data-lucide="lock"></i>
            </div>
            <h2>Accesso protetto</h2>
            <p>Inserisci il PIN per aprire il pannello Spotify Family</p>
            <input type="password" id="pinInput" inputmode="numeric" maxlength="8" placeholder="PIN">
            <button id="pinSubmit">Sblocca</button>
            <p id="pinErrore" class="pin-errore">PIN errato, riprova</p>
        </div>
    </div>

    <!-- ============ CONTENUTO PRINCIPALE ============ -->
    <div id="app" class="app-container hidden">
	
        <header class="app-header">
            <div class="header-left">
                <a href="dashboard.html" class="back-btn">
                    <i data-lucide="arrow-left"></i>
                    <span>Dashboard</span>
                </a>
            </div>
            <div class="header-center">
				<div class="brand">
                    <span class="brand-dot">				<svg height="50px" width="50px" version="1.1" viewBox="0 0 168 168">
					<path fill="#1ED760" d="m83.996 0.277c-46.249 0-83.743 37.493-83.743 83.742 0 46.251 37.494 83.741 83.743 83.741 46.254 0 83.744-37.49 83.744-83.741 0-46.246-37.49-83.738-83.745-83.738l0.001-0.004zm38.404 120.78c-1.5 2.46-4.72 3.24-7.18 1.73-19.662-12.01-44.414-14.73-73.564-8.07-2.809 0.64-5.609-1.12-6.249-3.93-0.643-2.81 1.11-5.61 3.926-6.25 31.9-7.291 59.263-4.15 81.337 9.34 2.46 1.51 3.24 4.72 1.73 7.18zm10.25-22.805c-1.89 3.075-5.91 4.045-8.98 2.155-22.51-13.839-56.823-17.846-83.448-9.764-3.453 1.043-7.1-0.903-8.148-4.35-1.04-3.453 0.907-7.093 4.354-8.143 30.413-9.228 68.222-4.758 94.072 11.127 3.07 1.89 4.04 5.91 2.15 8.976v-0.001zm0.88-23.744c-26.99-16.031-71.52-17.505-97.289-9.684-4.138 1.255-8.514-1.081-9.768-5.219-1.254-4.14 1.08-8.513 5.221-9.771 29.581-8.98 78.756-7.245 109.83 11.202 3.73 2.209 4.95 7.016 2.74 10.733-2.2 3.722-7.02 4.949-10.73 2.739z"/></svg></span>
                    <h1 class="app-title">Spotify Family</h1>
                </div>
            </div>
            <div class="header-right">
                <button id="themeToggle" class="theme-toggle" title="Cambia tema">
                    <i data-lucide="moon"></i>
                </button>
            </div>
        </header>

        <main class="content">

            <!-- Periodo attuale: riepilogo E form insieme -->
            <section class="riepilogo" id="riepilogo">
                <div class="riepilogo-header">
                    <h2 id="riepilogoTitolo">Periodo attuale</h2>
                    <button type="button" id="nuovoPeriodoBtn" class="btn-link">
                        <i data-lucide="plus"></i>
                        <span>Nuovo periodo</span>
                    </button>
                </div>

                <div class="barra-quota">
                    <div id="barraPagato" class="barra-pagato" style="width:0%"></div>
                </div>
                <div class="riepilogo-legenda">
                    <span><i class="dot dot-ok"></i> Pagato: <b id="countPagato">0</b>/<span id="countTotale">0</span></span>
                    <span><i class="dot dot-no"></i> Da pagare: <b id="countNonPagato">0</b></span>
                </div>

                <form id="formPeriodo">
                    <div class="riga-campi">
                        <label>
                            Data inizio
                            <input type="date" id="campoInizio" required>
                        </label>
                        <label>
                            Data fine
                            <input type="date" id="campoFine" required>
                        </label>
                        <label>
                            € a persona
                            <input type="number" id="campoQuota" step="0.01" min="0" placeholder="ultimo importo pagato">
                        </label>
                        <label>
                            Durata
                            <input type="text" id="campoDurata" placeholder="es. 3 mesi" required>
                        </label>
                    </div>

                    <div class="membri-box">
                        <p class="membri-titolo">Chi ha pagato?</p>
                        <div id="listaMembri" class="lista-membri-checkbox"></div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="salvaBtn">Salva modifiche</button>
                        <span id="salvaStato" class="salva-stato"></span>
                    </div>
                </form>
            </section>

            <!-- Storico dei periodi passati -->
            <section class="storico">
                <h2>Storico pagamenti</h2>
                <div class="tabella-wrap">
                    <table id="tabellaStorico">
                        <thead>
                            <tr>
                                <th>Periodo</th>
                                <th>€ P.P.</th>
                                <th>Durata</th>
                                <th>Pagato</th>
                                <th>Da pagare</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabella">
                            <!-- righe generate da spotify.js -->
                        </tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>

    <script src="spotify.js"></script>
</body>
</html>
