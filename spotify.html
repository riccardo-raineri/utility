<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Family — Monitoraggio Pagamenti</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Foglio di Stile Esterno -->
    <link rel="stylesheet" href="spotify.css">
</head>
<body>

    <div class="bg-canvas">
        <div class="bg-gradient-mesh"></div>
    </div>

    <div class="app-container">
        <!-- Barra di Navigazione -->
        <nav class="top-nav">
            <a class="back-link" href="dashboard.html">
                <i data-lucide="arrow-left"></i>
                Dashboard
            </a>
            <div class="sync-status" onclick="window.open('https://docs.google.com/spreadsheets/d/1LEUAJ2FAcZxNC8bCBa2TUCJB3Az9AZ65euGPNrNZrLU/edit', '_blank')">
                <i data-lucide="external-link"></i>
                <span>Apri Google Sheets</span>
            </div>
        </nav>

        <!-- Header -->
        <header class="header-section">
            <div class="header-icon">
                <i data-lucide="music"></i>
            </div>
            <h1 class="title">Spotify Family</h1>
            <p class="subtitle">Monitoraggio e aggiornamento quote trimestrali (7 partecipanti)</p>
        </header>

        <!-- Modulo Interattivo Protetto da PIN -->
        <div class="card interactive-form">
            <div class="card-header-inner">
                <div class="icon">
                    <i data-lucide="lock" id="form-lock-icon"></i>
                </div>
                <div>
                    <h3 style="font-size: 15px; font-weight: 700;">Aggiungi o Aggiorna Periodo</h3>
                    <p style="font-size: 12px; color: var(--text-secondary);" id="form-subtitle">Inserisci il PIN per sbloccare la modifica</p>
                </div>
            </div>
            
            <!-- Barra di sblocco PIN -->
            <div id="pin-prompt-container" style="display: flex; gap: 8px; margin-bottom: 14px;">
                <input type="password" id="input-pin" placeholder="Inserisci PIN di sblocco">
                <button type="button" onclick="verifyPin()">Sblocca</button>
            </div>

            <!-- Form -->
            <form id="spotify-form" onsubmit="savePaymentData(event)">
                
                <!-- SELETTORE RAPIDO PER AGGIORNARE UN PERIODO ESISTENTE -->
                <div class="form-group" style="margin-bottom: 14px; background: rgba(29, 185, 84, 0.05); padding: 12px; border-radius: 10px; border: 1px solid var(--spotify-green-border);">
                    <label style="color: var(--spotify-green); font-weight: 700;">⚡ SELEZIONA VELOCEMENTE UN PERIODO ESISTENTE DA AGGIORNARE</label>
                    <select id="quick-select-period" onchange="loadPeriodIntoForm()" disabled style="width: 100%; padding: 10px 14px; background: var(--bg-base); border: 1px solid var(--border-subtle); border-radius: 10px; color: white; font-size: 13px; margin-top: 6px; outline: none;">
                        <option value="">-- Oppure compila le date sotto per un nuovo periodo --</option>
                    </select>
                </div>

                <!-- Selezione Date tramite Calendario -->
                <div class="form-grid-dates">
                    <div class="form-group">
                        <label>SELEZIONA DATA INIZIO</label>
                        <input type="date" id="date-start" disabled onchange="updateDatesFromCalendar()">
                    </div>
                    <div class="form-group">
                        <label>SELEZIONA DATA FINE</label>
                        <input type="date" id="date-end" disabled onchange="updateDatesFromCalendar()">
                    </div>
                </div>

                <div class="form-grid" style="margin-top: 12px;">
                    <div class="form-group">
                        <label>PERIODO INIZIO (Testo)</label>
                        <input type="text" id="input-inizio" placeholder="Es. 16 giugno 2026" required disabled>
                    </div>
                    <div class="form-group">
                        <label>PERIODO FINE (Testo)</label>
                        <input type="text" id="input-fine" placeholder="Es. 16 settembre 2026" required disabled>
                    </div>
                    <div class="form-group">
                        <label>DURATA</label>
                        <input type="text" id="input-durata" value="3 mesi" required disabled>
                    </div>
                </div>

                <div class="form-group">
                    <label>QUOTA (€ P.P.)</label>
                    <input type="text" id="input-prezzo" value="€10.50" required disabled style="margin-bottom: 12px;">
                </div>

                <div class="form-group">
                    <label>CHI HA PAGATO (Spunta i partecipanti man mano che pagano)</label>
                    <div class="checkboxes-group" id="users-checkboxes">
                        <label><input type="checkbox" name="user" value="Alessandra" disabled> Alessandra</label>
                        <label><input type="checkbox" name="user" value="Chiara" disabled> Chiara</label>
                        <label><input type="checkbox" name="user" value="Giulia" disabled> Giulia</label>
                        <label><input type="checkbox" name="user" value="Riccardo" disabled> Riccardo</label>
                        <label><input type="checkbox" name="user" value="Sergio" disabled> Sergio</label>
                        <label><input type="checkbox" name="user" value="Sharon" disabled> Sharon</label>
                        <label><input type="checkbox" name="user" value="Valentina" disabled> Valentina</label>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="btn-submit" disabled>
                    <i data-lucide="save" style="width:14px;height:14px;"></i> Salva Modifiche / Aggiorna
                </button>
            </form>
        </div>

        <!-- Storico Pagamenti Dinamico -->
        <main class="payments-list" id="payments-container">
            <!-- Popolato dinamicamente dallo script -->
        </main>

        <footer class="app-footer">
            <span>Spotify Family Tracker — Riccardo Raineri — 2026</span>
        </footer>
    </div>

    <!-- Script Esterno -->
    <script src="spotify.js"></script>
</body>
</html>
