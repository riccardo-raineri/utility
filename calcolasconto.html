<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcola Sconto</title>
	<link rel="icon" type="image/svg+xml" href="favicon.svg">
	<link rel="apple-touch-icon" href="apple-touch-icon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Foglio di Stile -->
    <link rel="stylesheet" href="calcolasconto.css">
</head>
<body>

    <!-- Canvas di Sfondo -->
    <div class="bg-canvas">
        <div class="bg-grid-pattern"></div>
    </div>

    <div class="app-container">

        <!-- Navigation Bar -->
        <nav class="top-nav">
            <!-- Link alla Dashboard -->
            <a class="back-link" href="dashboard.html">
                <i data-lucide="arrow-left"></i>
                Dashboard
            </a>

            <div class="nav-actions">
                <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" aria-label="Cambia tema">
                    <i data-lucide="sun" class="icon-sun"></i>
                    <i data-lucide="moon" class="icon-moon"></i>
                </button>
                <span class="tool-badge">
                    <i data-lucide="percent"></i>
                    Calcolo Sconti
                </span>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="tool-layout">
            <div class="card">
                
                <div class="card-header">
                    <div class="icon">
                        <i data-lucide="shopping-cart"></i>
                    </div>
                    <div class="title-group">
                        <h2>Calcola Sconto</h2>
                        <p>Prezzo, risparmio effettivo e totale finale.</p>
                    </div>
                </div>

                <!-- Form Inputs -->
                <div class="form-body">
                    <div class="input-group">
                        <label for="price">Prezzo di Listino (€)</label>
                        <div class="input-wrapper">
                            <span class="input-prefix">€</span>
                            <input type="number" id="price" placeholder="0.00" min="0" step="0.01" autofocus>
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label for="discount">Sconto (%)</label>
                            <div class="input-wrapper">
                                <span class="input-prefix">%</span>
                                <input type="number" id="discount" placeholder="0" min="0" max="100">
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="quantity">Quantità</label>
                            <div class="input-wrapper">
                                <input type="number" id="quantity" placeholder="1" min="1" step="1" value="1">
                            </div>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="action-group">
                        <button class="btn-primary" onclick="calculateDiscount()">
                            <i data-lucide="calculator"></i>
                            Calcola Risparmio
                        </button>
                        <button class="btn-secondary" onclick="resetForm()">
                            <i data-lucide="rotate-ccw"></i>
                            Nuovo Calcolo
                        </button>
                    </div>
                </div>

                <!-- Output Risultati -->
                <div class="result" id="result-box">
                    <div class="result-row">
                        <span class="label">Risparmio unitario</span>
                        <span class="value"><span id="saved-unit">0.00</span> €</span>
                    </div>
                    <div class="result-row">
                        <span class="label">Risparmio totale (× qta)</span>
                        <span class="value"><span id="saved-total">0.00</span> €</span>
                    </div>
                    <div class="result-row total">
                        <span class="label">Totale da pagare</span>
                        <span class="value highlight"><span id="final-price">0.00</span> €</span>
                    </div>

                    <!-- Progress Bar della percentuale risparmiata -->
                    <div class="savings-bar-container">
                        <div class="savings-bar-header">
                            <span>Percentuale Risparmiata</span>
                            <span id="savings-bar-label">0%</span>
                        </div>
                        <div class="savings-bar-track">
                            <div class="savings-bar-fill" id="savings-bar"></div>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <span>Creative Utility Toolbox — Riccardo Raineri</span>
        </footer>

    </div>

    <!-- Script Logico del Tool e Tema -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) {
                lucide.createIcons();
            }
            applyStoredTheme();
        });

        /* -----------------------------------------------------------------
           GESTIONE TEMA (DEFAULT SCURO / OPTIONAL LIGHT)
           ----------------------------------------------------------------- */
        function applyStoredTheme() {
            const stored = localStorage.getItem('toolbox_theme');
            // Il tema di default è Dark. Si passa al chiaro solo se specificato esplicitamente.
            if (stored === 'light') {
                document.body.setAttribute('data-theme', 'light');
            } else {
                document.body.removeAttribute('data-theme');
            }
        }

        function toggleTheme() {
            const body = document.body;
            const isLight = body.getAttribute('data-theme') === 'light';

            if (isLight) {
                body.removeAttribute('data-theme');
                localStorage.setItem('toolbox_theme', 'dark');
            } else {
                body.setAttribute('data-theme', 'light');
                localStorage.setItem('toolbox_theme', 'light');
            }
        }

        /* -----------------------------------------------------------------
           CALCOLO E LOGICA APPLICATIVA
           ----------------------------------------------------------------- */
        function calculateDiscount() {
            const price = parseFloat(document.getElementById('price').value);
            const discount = parseFloat(document.getElementById('discount').value);
            const quantity = parseInt(document.getElementById('quantity').value) || 1;

            if (isNaN(price) || isNaN(discount) || price < 0 || discount < 0) return;

            const savedPerUnit = price * (discount / 100);
            const finalPerUnit = price - savedPerUnit;
            const savedTotal = savedPerUnit * quantity;
            const finalTotal = finalPerUnit * quantity;

            document.getElementById('saved-unit').innerText = savedPerUnit.toFixed(2);
            document.getElementById('saved-total').innerText = savedTotal.toFixed(2);
            document.getElementById('final-price').innerText = finalTotal.toFixed(2);

            const clampedDiscount = Math.min(Math.max(discount, 0), 100);
            document.getElementById('savings-bar').style.width = clampedDiscount + '%';
            document.getElementById('savings-bar-label').innerText = clampedDiscount.toFixed(0) + '%';

            document.getElementById('result-box').style.display = 'flex';
        }

        function resetForm() {
            document.getElementById('price').value = '';
            document.getElementById('discount').value = '';
            document.getElementById('quantity').value = 1;
            document.getElementById('result-box').style.display = 'none';
            document.getElementById('savings-bar').style.width = '0%';
            document.getElementById('savings-bar-label').innerText = '0%';
        }
    </script>
</body>
</html>
